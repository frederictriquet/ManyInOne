name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  # ── Tests unitaires (JVM, rapide) ───────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Run unit tests with coverage
        run: ./gradlew testDebugUnitTest createDebugUnitTestCoverageReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/

      - name: Upload unit test coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: app/build/reports/coverage/test/debug/report.xml
          flags: unit-tests
          fail_ci_if_error: true

  # ── Tests instrumentés (émulateur Android) ──────────────────────────────────
  instrumented-tests:
    name: Instrumented Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Enable KVM (accélération matérielle émulateur)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests with coverage
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest createDebugAndroidTestCoverageReport

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/

      - name: Upload instrumented coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: app/build/reports/coverage/androidTest/debug/connected/report.xml
          flags: instrumented-tests
          fail_ci_if_error: true
